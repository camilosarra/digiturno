    <div id="cliente">

</div>

<audio id="alertSound" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>
const socket = io();
let miTurno = null;

if (window.location.pathname.includes("admin")) {
    document.getElementById("cliente").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
}

function obtenerTemas(){
    let temas = [];
    document.querySelectorAll(".tema:checked").forEach(t=>temas.push(t.value));
    return temas.join(", ");
}

function solicitarTurno(){
    const nombre = document.getElementById("nombre").value;
    const tema = obtenerTemas();

    if(!nombre || !tema){
        alert("Debe ingresar nombre y seleccionar un tema");
        return;
    }

    socket.emit("solicitar_turno",{nombre,tema});
}

socket.on("turno_asignado",(data)=>{
    miTurno = data.id;
});

socket.on("estado",(data)=>{
    document.getElementById("espera").innerText = data.cola.length;
    document.getElementById("atendiendo").innerText = data.atendiendo || "-";

    const lista = document.getElementById("listaCola");
    if(lista){
        lista.innerHTML="";
        data.cola.forEach(item=>{
            const li=document.createElement("li");
            li.className="list-group-item";
            li.innerText=`${item.nombre} - ${item.tema}`;
            li.onclick=()=>socket.emit("llamar_turno",item.id);
            lista.appendChild(li);
        });
    }
});

socket.on("turno_llamado",(data)=>{
    if(miTurno===data.id){
        document.getElementById("alertSound").play();
        if(navigator.vibrate) navigator.vibrate([500,200,500]);
        alert("¡Es su turno en Secretaría General!");
    }
});
</script>
